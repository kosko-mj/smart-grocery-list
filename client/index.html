<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omobono - Smart Grocery List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Omobono</h1>
        <div class="subtitle">Smart shopping lists</div>
        
        <div class="create-section">
            <h3>Create new list</h3>
            <input type="text" id="newListName" placeholder="List name...">
            <button id="createListBtn">Create List</button>
        </div>
        
        <div class="my-lists-section">
            <h3>My Lists</h3>
            <div id="listsContainer"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
